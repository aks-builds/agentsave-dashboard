name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Generate RSA keypair for tests
        run: |
          python - <<'EOF'
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.hazmat.primitives import serialization
          import os
          private_key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
          pub_pem = private_key.public_key().public_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PublicFormat.SubjectPublicKeyInfo
          ).decode()
          priv_pem = private_key.private_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PrivateFormat.TraditionalOpenSSL,
              encryption_algorithm=serialization.NoEncryption()
          ).decode()
          os.makedirs("agentsave_dashboard/keys", exist_ok=True)
          os.makedirs("scripts", exist_ok=True)
          open("agentsave_dashboard/keys/public.pem", "w").write(pub_pem)
          open("scripts/private.pem", "w").write(priv_pem)
          EOF
      - name: Run tests
        run: python -m pytest tests/ -q
        env:
          AGENTSAVE_TEST_MODE: "1"
